<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원소 주기율표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#2a3550;
    --accent:#4f8ef7;--accent2:#7c5cfc;--text:#e8eaf0;--text-muted:#7a8599;
    --success:#34d399;--empty:#1e2a3a;
    --col-alkali:#ef4444;--col-alkali-earth:#f97316;--col-transition:#3b82f6;
    --col-post-transition:#8b5cf6;--col-metalloid:#10b981;--col-nonmetal:#f59e0b;
    --col-halogen:#ec4899;--col-noble:#06b6d4;--col-lanthanide:#84cc16;--col-actinide:#a855f7;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(79,142,247,.08) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(124,92,252,.06) 0%,transparent 60%);pointer-events:none;z-index:0;}

  /* 잘못된 URL 안내 */
  #error-screen{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem;text-align:center;padding:2rem;background:var(--bg);}
  #error-screen p{color:var(--text-muted);font-size:.95rem;line-height:1.7;}
  #error-screen h2{font-size:1.3rem;}

  /* 헤더 */
  header{position:relative;z-index:10;padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,14,26,.8);backdrop-filter:blur(12px);gap:1rem;flex-wrap:wrap;}
  .logo{font-family:'Space Mono',monospace;font-size:1rem;color:var(--accent);white-space:nowrap;}
  .logo span{color:var(--text-muted);}
  .header-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
  #user-info{font-size:.82rem;color:var(--text-muted);display:none;}
  #user-info strong{color:var(--accent);}
  .btn{font-family:'Noto Sans KR',sans-serif;font-size:.82rem;padding:.45rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:all .2s;white-space:nowrap;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}

  /* 로그인 */
  #login-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  #login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(79,142,247,.12) 0%,transparent 70%);pointer-events:none;}
  .login-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:min(420px,90vw);text-align:center;}
  .login-icon{font-size:2.2rem;margin-bottom:.8rem;display:block;}
  .login-title{font-size:1.3rem;font-weight:700;margin-bottom:.3rem;}
  .login-cls-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:.85rem;background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3);color:var(--accent);border-radius:6px;padding:.25rem .8rem;margin-bottom:1.2rem;}
  .login-desc{font-size:.88rem;color:var(--text-muted);margin-bottom:1.8rem;line-height:1.6;}
  .form-group{text-align:left;margin-bottom:.9rem;}
  .form-group label{display:block;font-size:.78rem;color:var(--text-muted);margin-bottom:.35rem;font-weight:500;}
  .form-group input{width:100%;padding:.7rem 1rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s;}
  .form-group input:focus{border-color:var(--accent);}
  #login-error{font-size:.83rem;color:#f87171;margin-bottom:.9rem;display:none;}
  .login-btn{width:100%;padding:.85rem;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;}
  .login-btn:hover{background:#3a7de8;}
  .login-btn:active{transform:scale(.98);}
  .login-note{margin-top:1rem;font-size:.78rem;color:var(--text-muted);}

  /* 메인 */
  #main-screen{display:none;}
  .page-title{position:relative;z-index:1;text-align:center;padding:1.8rem 1rem 1.2rem;}
  .page-title h2{font-size:1.4rem;font-weight:700;margin-bottom:.3rem;}
  .class-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:.8rem;background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3);color:var(--accent);border-radius:6px;padding:.2rem .7rem;margin-bottom:.4rem;}
  .page-title p{font-size:.88rem;color:var(--text-muted);}

  .progress-bar-wrap{position:relative;z-index:1;max-width:560px;margin:0 auto 1.2rem;padding:0 1.5rem;}
  .progress-label{display:flex;justify-content:space-between;font-size:.78rem;color:var(--text-muted);margin-bottom:.35rem;}
  .progress-bar{height:5px;background:var(--border);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .8s ease;width:0%;}

  .legend{position:relative;z-index:1;display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;padding:0 1rem 1.2rem;}
  .legend-item{display:flex;align-items:center;gap:.3rem;font-size:.7rem;color:var(--text-muted);}
  .legend-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}

  .periodic-wrapper{position:relative;z-index:1;overflow-x:auto;padding:0 1rem 3rem;}
  .periodic-table{display:grid;grid-template-columns:repeat(18,minmax(52px,1fr));gap:3px;min-width:980px;max-width:1200px;margin:0 auto;}

  .element-cell{aspect-ratio:1;border-radius:8px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;border:1px solid transparent;}
  .element-cell:hover{transform:scale(1.08);z-index:10;box-shadow:0 4px 20px rgba(0,0,0,.5);}
  .element-cell.empty{background:transparent;cursor:default;}
  .element-cell.empty:hover{transform:none;box-shadow:none;}
  .element-cell.no-card{background:var(--empty);border-color:var(--border);}
  .element-cell.has-card .card-front{position:absolute;inset:0;background-size:cover;background-position:center;}
  .element-cell.has-card .card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 50%);display:flex;flex-direction:column;justify-content:flex-end;padding:4px;}
  .cell-number{font-family:'Space Mono',monospace;font-size:.55rem;line-height:1;color:rgba(255,255,255,.7);position:absolute;top:3px;left:4px;}
  .cell-symbol{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;line-height:1;color:#fff;text-align:center;width:100%;}
  .cell-name{font-size:.5rem;color:rgba(255,255,255,.75);text-align:center;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .element-cell.no-card.alkali{border-left:2px solid var(--col-alkali);}
  .element-cell.no-card.alkali-earth{border-left:2px solid var(--col-alkali-earth);}
  .element-cell.no-card.transition{border-left:2px solid var(--col-transition);}
  .element-cell.no-card.post-transition{border-left:2px solid var(--col-post-transition);}
  .element-cell.no-card.metalloid{border-left:2px solid var(--col-metalloid);}
  .element-cell.no-card.nonmetal{border-left:2px solid var(--col-nonmetal);}
  .element-cell.no-card.halogen{border-left:2px solid var(--col-halogen);}
  .element-cell.no-card.noble{border-left:2px solid var(--col-noble);}
  .element-cell.no-card.lanthanide{border-left:2px solid var(--col-lanthanide);}
  .element-cell.no-card.actinide{border-left:2px solid var(--col-actinide);}

  /* 모달 배경 딤 */
  #modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0);display:none;transition:background .35s ease;}
  #modal-overlay.active{background:rgba(0,0,0,.75);}
  
  /* 카드: 셀 위치에서 중앙으로 이동 */
  .modal-card{
    position:fixed;z-index:201;
    width:min(480px,88vw);
    perspective:1200px;
    pointer-events:none;
    opacity:0;
    transition:top .45s cubic-bezier(.4,0,.2,1),left .45s cubic-bezier(.4,0,.2,1),width .45s cubic-bezier(.4,0,.2,1),height .45s cubic-bezier(.4,0,.2,1),opacity .3s ease;
  }
  .modal-card.active{pointer-events:auto;opacity:1;}
  
  .card-flipper{width:100%;padding-bottom:100%;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);}
  .card-flipper.flipped{transform:rotateY(180deg);}
  .card-face{position:absolute;inset:0;border-radius:16px;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--border);box-shadow:0 24px 60px rgba(0,0,0,.6);}
  .card-face img{width:100%;height:100%;object-fit:cover;display:block;}
  .card-face-back{transform:rotateY(180deg);}
  .card-face.no-image{background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.75rem;}
  .card-face.no-image span{font-size:3rem;}
  .card-face.no-image p{color:var(--text-muted);font-size:.9rem;}
  
  .modal-controls{display:flex;align-items:center;justify-content:space-between;margin-top:.85rem;gap:.75rem;opacity:0;transform:translateY(8px);transition:opacity .3s ease .25s,transform .3s ease .25s;}
  .modal-card.active .modal-controls{opacity:1;transform:translateY(0);}
  .modal-element-name{font-size:1.1rem;font-weight:700;flex:1;}
  .modal-element-sub{font-size:.78rem;color:var(--text-muted);}
  .flip-btn{font-family:'Noto Sans KR',sans-serif;font-size:.8rem;padding:.5rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:all .2s;white-space:nowrap;}
  .flip-btn:hover{border-color:var(--accent);color:var(--accent);}
  .close-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
  .close-btn:hover{border-color:#f87171;color:#f87171;}
  .modal-hint{text-align:center;font-size:.72rem;color:var(--text-muted);margin-top:.5rem;opacity:0;transition:opacity .3s ease .4s;}
  .modal-card.active .modal-hint{opacity:.6;}
  .loading-spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- 잘못된 URL 안내 -->
<div id="error-screen">
  <p style="font-size:2rem">⚠️</p>
  <h2>학급 정보가 없습니다</h2>
  <p>올바른 URL로 접속해 주세요.<br>예: <code style="color:var(--accent)">?class=2-1</code></p>
</div>

<header>
  <div class="logo">⚛ 원소<span>카드</span></div>
  <div class="header-right">
    <div id="user-info"></div>
    <button class="btn" id="upload-btn" style="display:none" onclick="goUpload()">내 카드 업로드</button>
    <button class="btn" id="logout-btn" style="display:none" onclick="logout()">로그아웃</button>
  </div>
</header>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-card">
    <span class="login-icon">🔬</span>
    <p class="login-title">원소 주기율표</p>
    <div class="login-cls-badge" id="login-cls-badge"></div>
    <p class="login-desc">학번과 이름을 입력하면<br>주기율표를 함께 완성할 수 있어요</p>
    <div class="form-group">
      <label>학번</label>
      <input type="text" id="input-student-id" placeholder="예: 20251001" maxlength="10" onkeydown="if(event.key==='Enter')tryLogin()">
    </div>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="input-name" placeholder="홍길동" onkeydown="if(event.key==='Enter')tryLogin()">
    </div>
    <div id="login-error"></div>
    <button class="login-btn" onclick="tryLogin()">입장하기</button>
    <p class="login-note">로그인 정보는 이 기기에만 저장됩니다</p>
  </div>
</div>

<!-- 메인 -->
<div id="main-screen">
  <div class="page-title">
    <div class="class-badge" id="class-badge"></div>
    <h2>우리 반 원소 주기율표</h2>
    <p id="progress-text">카드를 불러오는 중... <span class="loading-spinner"></span></p>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-label"><span>완성도</span><span id="progress-count">0 / 0</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-alkali)"></div>알칼리 금속</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-alkali-earth)"></div>알칼리 토금속</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-transition)"></div>전이 금속</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-post-transition)"></div>전이 후 금속</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-metalloid)"></div>준금속</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-nonmetal)"></div>비금속</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-halogen)"></div>할로젠</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-noble)"></div>비활성 기체</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-lanthanide)"></div>란타넘족</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-actinide)"></div>악티늄족</div>
  </div>
  <div class="periodic-wrapper">
    <div class="periodic-table" id="periodic-table"></div>
  </div>
</div>

<!-- 배경 딤 -->
<div id="modal-overlay" onclick="closeModalBtn()"></div>

<!-- 카드 (overlay 밖, 독립 레이어) -->
<div class="modal-card" id="modal-card">
  <div class="card-flipper" id="card-flipper">
    <div class="card-face card-face-front" id="modal-front"></div>
    <div class="card-face card-face-back"  id="modal-back"></div>
  </div>
  <div class="modal-controls">
    <div>
      <div class="modal-element-name" id="modal-name"></div>
      <div class="modal-element-sub"  id="modal-sub"></div>
    </div>
    <button class="flip-btn" onclick="flipCard()">뒤집기 🔄</button>
    <button class="close-btn" onclick="closeModalBtn()">✕</button>
  </div>
  <div class="modal-hint">배경을 클릭하면 닫힙니다</div>
</div>

  [95,'Am','아메리슘',9,10,'actinide'],[96,'Cm','퀴륨',9,11,'actinide'],
  [97,'Bk','버클륨',9,12,'actinide'],[98,'Cf','캘리포늄',9,13,'actinide'],
  [99,'Es','아인슈타이늄',9,14,'actinide'],[100,'Fm','페르뮴',9,15,'actinide'],
  [101,'Md','멘델레븀',9,16,'actinide'],[102,'No','노벨륨',9,17,'actinide'],

  [104,'Rf','러더포듐',7,4,'transition'],[105,'Db','더브늄',7,5,'transition'],
  [106,'Sg','시보귬',7,6,'transition'],[107,'Bh','보륨',7,7,'transition'],

  [110,'Ds','다름슈타튬',7,10,'transition'],[111,'Rg','뢴트게늄',7,11,'transition'],
  [112,'Cn','코페르니슘',7,12,'transition'],[113,'Nh','니호늄',7,13,'post-transition'],
  [114,'Fl','플레로븀',7,14,'post-transition'],[115,'Mc','모스코븀',7,15,'post-transition'],
  [116,'Lv','리버모륨',7,16,'post-transition'],[117,'Ts','테네신',7,17,'halogen'],
  [118,'Og','오가네손',7,18,'noble'],
];

// ── URL에서 학급 파라미터 추출 ──
const params   = new URLSearchParams(location.search);
const urlClass = params.get('class'); // "2-1" ~ "2-10"

let students = {}, currentUser = null, cardData = {}, unsubscribe = null;

async function init() {
  // 학급 파라미터 없으면 오류 화면
  if (!urlClass) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('error-screen').style.display = 'flex';
    return;
  }

  document.getElementById('login-cls-badge').textContent = `${urlClass}반`;
  document.getElementById('class-badge').textContent = `${urlClass}반`;
  document.title = `${urlClass}반 원소 주기율표`;

  await loadStudents();

  // 세션 복원 — 저장된 학급과 현재 URL 학급이 같아야만 복원
  const saved = sessionStorage.getItem('user');
  if (saved) {
    const parsed = JSON.parse(saved);
    if (parsed.cls === urlClass) {
      currentUser = parsed;
      showMain();
      return;
    } else {
      // 다른 반 URL로 접속하면 세션 초기화
      sessionStorage.removeItem('user');
    }
  }
}

async function loadStudents() {
  const res = await fetch('./students.json');
  const all  = await res.json();
  // 현재 URL 학급 학생만 필터링
  students = Object.fromEntries(
    Object.entries(all).filter(([, v]) => v.cls === urlClass)
  );
}

// ── 로그인 ──
// 학번으로 students에서 찾고, 이름 대조 후 cls가 urlClass와 일치하는지 확인
window.tryLogin = function() {
  const sid  = document.getElementById('input-student-id').value.trim();
  const name = document.getElementById('input-name').value.trim();
  const errEl = document.getElementById('login-error');

  const student = students[sid];

  // 학번 없음 또는 이름 불일치
  if (!student || student.name !== name) {
    errEl.textContent = '학번 또는 이름이 일치하지 않습니다.';
    errEl.style.display = 'block';
    return;
  }

  // 학번의 cls가 현재 URL 학급과 다른 경우 (다른 반 학생이 이 URL로 접속 시도)
  if (student.cls !== urlClass) {
    errEl.textContent = `이 페이지는 ${urlClass}반 전용입니다. 담임선생님께 올바른 URL을 확인하세요.`;
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';
  currentUser = { studentId: sid, name, cls: urlClass, elements: student.elements };
  sessionStorage.setItem('user', JSON.stringify(currentUser));
  showMain();
};

window.logout = function() { sessionStorage.removeItem('user'); location.reload(); };

// upload.html로 이동할 때도 class 파라미터 유지
window.goUpload = function() {
  location.href = `upload.html?class=${encodeURIComponent(urlClass)}`;
};

// ── 메인 화면 ──
function showMain() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display  = 'block';
  document.getElementById('user-info').style.display    = 'block';
  document.getElementById('upload-btn').style.display   = 'block';
  document.getElementById('logout-btn').style.display   = 'block';

  const elNames = currentUser.elements.map(n => ELEMENTS[n-1]?.[2] || n).join(', ');
  document.getElementById('user-info').innerHTML =
    `<strong>${currentUser.name}</strong> · ${urlClass}반 · ${elNames}`;

  buildTable();

  // Firestore 구독: classes/{cls}/elements
  unsubscribe = onSnapshot(collection(db, 'classes', urlClass, 'elements'), snap => {
    cardData = {};
    snap.forEach(doc => { const d = doc.data(); cardData[d.elementNo] = d; });
    updateCells();
    updateProgress();
  });
}

// ── 주기율표 빌드 ──
function buildTable() {
  const table = document.getElementById('periodic-table');
  table.innerHTML = '';
  [1,2,3,4,5,6,7,'gap1',8,'gap2',9].forEach(row => {
    if (typeof row === 'string') {
      const gap = document.createElement('div');
      gap.style.cssText = 'grid-column:1/-1;height:8px;';
      table.appendChild(gap); return;
    }
    for (let col = 1; col <= 18; col++) {
      const el   = ELEMENTS.find(e => e[3] === row && e[4] === col);
      const cell = document.createElement('div');
      cell.className = 'element-cell';
      if (!el) {
        cell.classList.add('empty');
        if ((row === 6 || row === 7) && col === 3) {
          cell.classList.remove('empty'); cell.classList.add('no-card'); cell.style.opacity = '.4';
          cell.innerHTML = `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--text-muted)">${row===6?'57-71':'89-103'}</div>`;
        }
      } else {
        const [no, sym, name,,, cat] = el;
        cell.dataset.no = no;
        cell.classList.add('no-card', cat);
        cell.innerHTML = `<div class="cell-number">${no}</div><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px;"><div class="cell-symbol">${sym}</div><div class="cell-name">${name}</div></div>`;
        cell.addEventListener('click', () => openModal(no, cell));
      }
      table.appendChild(cell);
    }
  });
}

function updateCells() {
  document.querySelectorAll('.element-cell[data-no]').forEach(cell => {
    const no   = parseInt(cell.dataset.no);
    const card = cardData[no];
    const [, sym, name,,, cat] = ELEMENTS[no-1];
    if (card?.frontUrl) {
      cell.className = 'element-cell has-card';
      cell.innerHTML = `<div class="card-front" style="background-image:url('${card.frontUrl}')"></div><div class="card-overlay"><div class="cell-number">${no}</div><div class="cell-symbol">${sym}</div><div class="cell-name">${name}</div></div>`;
    } else {
      cell.className = `element-cell no-card ${cat}`;
      cell.innerHTML = `<div class="cell-number">${no}</div><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px;"><div class="cell-symbol">${sym}</div><div class="cell-name">${name}</div></div>`;
    }
    cell.addEventListener('click', () => openModal(no, cell));
  });
}

function updateProgress() {
  const total = Object.keys(students).length * 2;
  const done  = Object.values(cardData).filter(c => c.frontUrl).length;
  const pct   = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-text').textContent  = `${done}개 원소 카드 완성 · 클릭하면 자세히 볼 수 있어요`;
  document.getElementById('progress-count').textContent = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width  = `${pct}%`;
}

// ── 모달 ──
let isFlipped = false;
let isAnimating = false;

window.openModal = function(no, cellEl) {
  if (isAnimating) return;
  const card    = cardData[no];
  const [,sym,name] = ELEMENTS[no-1];
  const modalCard   = document.getElementById('modal-card');
  const overlay     = document.getElementById('modal-overlay');
  const flipper     = document.getElementById('card-flipper');

  // 앞/뒷면 내용 주입
  const frontEl = document.getElementById('modal-front');
  const backEl  = document.getElementById('modal-back');
  if (card?.frontUrl) {
    frontEl.innerHTML = `<img src="${card.frontUrl}" alt="${name} 앞면">`;
    backEl.innerHTML  = card.backUrl
      ? `<img src="${card.backUrl}" alt="${name} 뒷면">`
      : `<div class="no-image" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem"><span>📋</span><p>뒷면 카드 준비 중</p></div>`;
  } else {
    frontEl.innerHTML = `<div class="no-image" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem"><span style="font-family:'Space Mono',monospace;font-size:4rem;font-weight:700;color:var(--text-muted);opacity:.4">${sym}</span><p style="color:var(--text-muted)">${name} · 카드 준비 중</p></div>`;
    backEl.innerHTML  = `<div class="no-image" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><p style="color:var(--text-muted)">뒷면 없음</p></div>`;
  }
  document.getElementById('modal-name').textContent = `${sym} · ${name}`;
  document.getElementById('modal-sub').textContent  = `원자 번호 ${no}`;

  // 플리퍼 초기화
  isFlipped = false;
  flipper.classList.remove('flipped');
  flipper.style.transition = 'none';
  setTimeout(() => { flipper.style.transition = ''; }, 50);

  // 셀의 화면 위치 계산
  const cellRect  = cellEl.getBoundingClientRect();
  const cellCx    = cellRect.left + cellRect.width  / 2;
  const cellCy    = cellRect.top  + cellRect.height / 2;
  const cellSize  = cellRect.width;

  // 목표 크기 (중앙 최종 크기)
  const targetW = Math.min(480, window.innerWidth * 0.88);
  const targetH = targetW; // 정사각형 카드
  const targetL = (window.innerWidth  - targetW) / 2;
  const targetT = (window.innerHeight - targetH) / 2 - 30;

  // 시작: 셀 위치·크기에서 시작
  modalCard.style.transition = 'none';
  modalCard.style.width   = `${cellSize}px`;
  modalCard.style.height  = `${cellSize}px`;
  modalCard.style.left    = `${cellCx - cellSize/2}px`;
  modalCard.style.top     = `${cellCy - cellSize/2}px`;
  modalCard.style.opacity = '0';
  modalCard.style.display = 'block';

  // 오버레이 표시
  overlay.style.display = 'block';

  isAnimating = true;

  // 한 프레임 뒤 애니메이션 시작
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      modalCard.style.transition = 'top .45s cubic-bezier(.4,0,.2,1),left .45s cubic-bezier(.4,0,.2,1),width .45s cubic-bezier(.4,0,.2,1),height .45s cubic-bezier(.4,0,.2,1),opacity .3s ease';
      modalCard.style.width   = `${targetW}px`;
      modalCard.style.height  = `${targetH + 80}px`; // 컨트롤 영역 포함
      modalCard.style.left    = `${targetL}px`;
      modalCard.style.top     = `${targetT}px`;
      modalCard.style.opacity = '1';
      overlay.classList.add('active');
      modalCard.classList.add('active');
      setTimeout(() => { isAnimating = false; }, 500);
    });
  });
};

window.flipCard = () => {
  isFlipped = !isFlipped;
  document.getElementById('card-flipper').classList.toggle('flipped', isFlipped);
};

window.closeModalBtn = () => {
  if (isAnimating) return;
  const modalCard = document.getElementById('modal-card');
  const overlay   = document.getElementById('modal-overlay');
  isAnimating = true;
  modalCard.style.opacity = '0';
  overlay.classList.remove('active');
  modalCard.classList.remove('active');
  setTimeout(() => {
    modalCard.style.display = 'none';
    overlay.style.display   = 'none';
    isFlipped = false;
    document.getElementById('card-flipper').classList.remove('flipped');
    isAnimating = false;
  }, 380);
};

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });

init();
</script>
