<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원소 카드 AI 채점</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#2a3550;
    --accent:#4f8ef7;--accent2:#7c5cfc;--text:#e8eaf0;--text-muted:#7a8599;
    --success:#34d399;--danger:#f87171;--warning:#fbbf24;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 50% 10%,rgba(79,142,247,.08) 0%,transparent 60%);pointer-events:none;z-index:0;}

  header{position:sticky;top:0;z-index:50;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,14,26,.9);backdrop-filter:blur(12px);gap:1rem;flex-wrap:wrap;}
  .logo{font-family:'Space Mono',monospace;font-size:.95rem;color:var(--accent);}
  .logo span{color:var(--text-muted);}
  .btn{font-family:'Noto Sans KR',sans-serif;font-size:.85rem;padding:.55rem 1.2rem;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:all .2s;white-space:nowrap;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
  .btn-primary:hover{background:#3a7de8;color:#fff;border-color:#3a7de8;}
  .btn-success{background:var(--success);border-color:var(--success);color:#052e16;font-weight:700;}
  .btn-success:hover:not(:disabled){background:#22c55e;}

  .page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}

  /* 설정 패널 */
  .setup-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;margin-bottom:1.5rem;}
  .setup-card h2{font-size:1rem;font-weight:500;margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem;}
  .setup-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;}
  @media(max-width:700px){.setup-grid{grid-template-columns:1fr;}}
  .form-group label{display:block;font-size:.78rem;color:var(--text-muted);margin-bottom:.4rem;font-weight:500;}
  .form-group select,.form-group input[type=text]{width:100%;padding:.65rem 1rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
  .form-group select:focus,.form-group input[type=text]:focus{border-color:var(--accent);}

  /* PDF 업로드 */
  .upload-zone{border:2px dashed var(--border);border-radius:14px;padding:2rem;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
  .upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(79,142,247,.05);}
  .upload-zone.has-file{border-style:solid;border-color:var(--success);}
  .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .upload-zone p{font-size:.88rem;color:var(--text-muted);}
  .upload-zone .file-name{color:var(--success);font-size:.9rem;font-weight:500;margin-top:.5rem;}

  /* 학생 선택 */
  .student-nav{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;}
  .student-nav .nav-info{flex:1;font-size:.88rem;color:var(--text-muted);}
  .student-nav .nav-info strong{color:var(--accent);font-family:'Space Mono',monospace;}
  .student-select-wrap{display:flex;gap:.5rem;align-items:center;}
  .student-select-wrap select{padding:.55rem .9rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.9rem;outline:none;}

  /* 채점 메인 레이아웃 */
  .grading-layout{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
  @media(max-width:800px){.grading-layout{grid-template-columns:1fr;}}

  /* 자료 패널 */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
  .panel-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);font-size:.88rem;font-weight:500;display:flex;align-items:center;justify-content:space-between;gap:.5rem;}
  .panel-body{padding:1.25rem;}

  /* PDF 뷰어 */
  .pdf-viewer{width:100%;background:var(--surface2);border-radius:10px;overflow:hidden;position:relative;}
  .pdf-viewer canvas{width:100%;display:block;}
  .pdf-nav{display:flex;align-items:center;justify-content:center;gap:.75rem;padding:.75rem;border-top:1px solid var(--border);font-size:.82rem;color:var(--text-muted);}
  .pdf-nav button{font-family:'Noto Sans KR',sans-serif;font-size:.78rem;padding:.3rem .75rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .2s;}
  .pdf-nav button:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  .pdf-nav button:disabled{opacity:.3;cursor:not-allowed;}

  /* 카드 이미지 */
  .card-images{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
  .card-img-wrap{border-radius:10px;overflow:hidden;background:var(--surface2);position:relative;aspect-ratio:1;}
  .card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
  .card-img-wrap .img-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);font-size:.7rem;padding:.3rem .5rem;text-align:center;color:rgba(255,255,255,.8);}
  .card-img-wrap.no-card{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.4rem;}
  .card-img-wrap.no-card p{font-size:.78rem;color:var(--text-muted);}

  /* 채점 패널 */
  .score-section{margin-bottom:1.5rem;}
  .score-section:last-child{margin-bottom:0;}
  .score-label{font-size:.82rem;font-weight:500;margin-bottom:.75rem;color:var(--text-muted);display:flex;align-items:center;gap:.5rem;}
  .score-label .criterion-name{color:var(--text);}
  .score-buttons{display:flex;gap:.5rem;flex-wrap:wrap;}
  .score-btn{font-family:'Noto Sans KR',sans-serif;font-size:.8rem;padding:.4rem .85rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all .2s;}
  .score-btn:hover{border-color:var(--accent);color:var(--text);}
  .score-btn.selected{border-color:var(--accent);background:rgba(79,142,247,.15);color:var(--accent);font-weight:500;}
  .score-btn.selected.s-40,.score-btn.selected.s-35{border-color:var(--success);background:rgba(52,211,153,.1);color:var(--success);}
  .score-btn.selected.s-20,.score-btn.selected.s-25{border-color:var(--danger);background:rgba(248,113,113,.1);color:var(--danger);}
  .score-btn.selected.s-10,.score-btn.selected.s-15{border-color:var(--danger);background:rgba(248,113,113,.1);color:var(--danger);}
  .score-btn.selected.s-30{border-color:var(--warning);background:rgba(251,191,36,.1);color:var(--warning);}

  .ai-result{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1.25rem;font-size:.85rem;line-height:1.8;}
  .ai-result .ai-label{font-size:.72rem;color:var(--accent);font-weight:500;margin-bottom:.4rem;display:flex;align-items:center;gap:.3rem;}
  .ai-result .ai-text{color:var(--text-muted);}
  .ai-result .ai-text strong{color:var(--text);}

  .total-score{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.25);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;}
  .total-score .label{font-size:.85rem;color:var(--text-muted);}
  .total-score .score{font-family:'Space Mono',monospace;font-size:1.8rem;font-weight:700;color:var(--accent);}
  .total-score .max{font-size:.8rem;color:var(--text-muted);margin-left:.2rem;}

  .memo-wrap{margin-bottom:1.25rem;}
  .memo-wrap label{display:block;font-size:.78rem;color:var(--text-muted);margin-bottom:.4rem;font-weight:500;}
  .memo-wrap textarea{width:100%;padding:.75rem 1rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.85rem;outline:none;resize:vertical;min-height:70px;transition:border-color .2s;line-height:1.6;}
  .memo-wrap textarea:focus{border-color:var(--accent);}

  /* 상태 */
  .msg{border-radius:10px;padding:.75rem 1rem;font-size:.85rem;margin-bottom:1rem;line-height:1.6;}
  .msg.success{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:var(--success);}
  .msg.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--danger);}
  .msg.info{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.2);color:var(--accent);}
  .msg.loading{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);}

  .spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.3rem;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* 진행 현황 */
  .progress-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:.4rem;margin-bottom:1.5rem;}
  .prog-chip{border-radius:8px;padding:.4rem .5rem;font-size:.72rem;text-align:center;border:1px solid var(--border);cursor:pointer;transition:all .15s;}
  .prog-chip:hover{border-color:var(--accent);}
  .prog-chip.current{border-color:var(--accent);background:rgba(79,142,247,.1);}
  .prog-chip.done{border-color:var(--success);background:rgba(52,211,153,.08);color:var(--success);}
  .prog-chip .chip-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .prog-chip .chip-score{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--text-muted);}
  .prog-chip.done .chip-score{color:var(--success);}

  /* 요약 테이블 */
  .summary-table{width:100%;border-collapse:collapse;font-size:.82rem;}
  .summary-table th{padding:.55rem .75rem;text-align:center;color:var(--text-muted);font-weight:500;border-bottom:1px solid var(--border);background:var(--surface2);}
  .summary-table td{padding:.5rem .75rem;text-align:center;border-bottom:1px solid rgba(42,53,80,.4);}
  .summary-table tr:last-child td{border-bottom:none;}
  .summary-table td.td-name{text-align:left;font-weight:500;}
  .summary-table td.td-score{font-family:'Space Mono',monospace;color:var(--accent);font-weight:700;}
  .summary-table td.td-done{color:var(--success);}

  .hidden{display:none;}
  .tag{font-size:.7rem;background:rgba(79,142,247,.15);color:var(--accent);border-radius:4px;padding:.15rem .5rem;}
  .tag-success{background:rgba(52,211,153,.15);color:var(--success);}
</style>
</head>
<body>

<header>
  <div class="logo">⚗️ 원소<span>카드 AI 채점</span></div>
  <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;">
    <span id="header-progress" style="font-size:.8rem;color:var(--text-muted)"></span>
    <button class="btn btn-success" id="btn-export" onclick="exportExcel()" disabled>📥 엑셀 다운로드</button>
    <a href="converter.html" class="btn">← 관리 도구</a>
  </div>
</header>

<div class="page">

  <!-- ── 설정 ── -->
  <div class="setup-card" id="setup-card">
    <h2>⚙️ 채점 설정</h2>
    <div class="setup-grid">
      <div class="form-group">
        <label>반 선택</label>
        <select id="sel-cls" onchange="onClsChange()">
          <option value="">반 선택</option>
        </select>
      </div>
      <div class="form-group">
        <label>활동지 PDF (반 전체)</label>
        <div class="upload-zone" id="pdf-zone">
          <input type="file" accept=".pdf" id="pdf-input" onchange="handlePdf(event)">
          <p>📄 PDF 파일을 클릭 또는 드래그</p>
          <p class="file-name hidden" id="pdf-filename"></p>
        </div>
      </div>
      <div class="form-group" style="display:flex;flex-direction:column;justify-content:flex-end;">
        <button class="btn btn-primary" id="btn-start" onclick="startGrading()" disabled style="padding:.75rem;">
          채점 시작 →
        </button>
        <p style="font-size:.75rem;color:var(--text-muted);margin-top:.5rem;line-height:1.5">반 선택 + PDF 업로드 후<br>채점을 시작할 수 있습니다</p>
      </div>
    </div>
  </div>

  <!-- ── 채점 메인 ── -->
  <div id="grading-main" class="hidden">

    <!-- 학생 내비게이션 -->
    <div class="student-nav">
      <div class="nav-info">
        <strong id="nav-cls"></strong> · 
        <strong id="nav-current-name"></strong>
        (<span id="nav-idx"></span> / <span id="nav-total"></span>)
        · 원소 <strong id="nav-elems"></strong>번
      </div>
      <div class="student-select-wrap">
        <select id="student-sel" onchange="goToStudent(parseInt(this.value))"></select>
        <button class="btn" onclick="prevStudent()">◀</button>
        <button class="btn" onclick="nextStudent()">▶</button>
      </div>
    </div>

    <!-- 진행 현황 -->
    <div class="progress-grid" id="progress-grid"></div>

    <!-- 채점 레이아웃 -->
    <div class="grading-layout">

      <!-- 왼쪽: 자료 -->
      <div>
        <!-- 활동지 PDF -->
        <div class="panel" style="margin-bottom:1.25rem;">
          <div class="panel-header">
            📄 활동지 (1차시)
            <div style="display:flex;gap:.5rem;align-items:center">
              <span id="pdf-page-info" style="font-size:.75rem;color:var(--text-muted)"></span>
              <button class="btn" style="font-size:.75rem;padding:.3rem .7rem" onclick="autoFindPage()">자동 페이지 찾기</button>
            </div>
          </div>
          <div class="panel-body" style="padding:.75rem;">
            <div class="pdf-viewer" id="pdf-viewer">
              <canvas id="pdf-canvas"></canvas>
            </div>
            <div class="pdf-nav">
              <button id="pdf-prev" onclick="changePdfPage(-1)">◀</button>
              <span id="pdf-page-num" style="min-width:80px;text-align:center"></span>
              <button id="pdf-next" onclick="changePdfPage(1)">▶</button>
            </div>
          </div>
        </div>

        <!-- 원소 카드 -->
        <div class="panel">
          <div class="panel-header">🃏 원소 카드 (2차시)</div>
          <div class="panel-body" style="padding:.75rem;">
            <div id="card-area"></div>
          </div>
        </div>
      </div>

      <!-- 오른쪽: 채점 -->
      <div>
        <div class="panel">
          <div class="panel-header">
            🤖 AI 1차 채점
            <button class="btn btn-primary" id="btn-ai" onclick="runAI()" style="font-size:.78rem;padding:.4rem .9rem;">
              AI 채점 실행
            </button>
          </div>
          <div class="panel-body">

            <div id="ai-status"></div>

            <!-- AI 결과 요약 -->
            <div id="ai-result-box" class="ai-result hidden">
              <div class="ai-label">🤖 AI 평가 의견</div>
              <div class="ai-text" id="ai-comment"></div>
            </div>

            <!-- 총점 -->
            <div class="total-score" id="total-score-box">
              <div class="label">총점 (기본점수 50점 포함)</div>
              <div>
                <span class="score" id="total-score-val">—</span>
                <span class="max">/ 150</span>
              </div>
            </div>

            <!-- 내용 정확성 -->
            <div class="score-section">
              <div class="score-label">
                <span class="criterion-name">① 내용의 정확성 및 충실성</span>
                <span class="tag">최대 40점</span>
              </div>
              <div class="score-buttons" id="score-accuracy">
                <button class="score-btn s-40" onclick="setScore('accuracy',40,this)">상 40</button>
                <button class="score-btn s-35" onclick="setScore('accuracy',35,this)">중상 35</button>
                <button class="score-btn s-30" onclick="setScore('accuracy',30,this)">중 30</button>
                <button class="score-btn s-25" onclick="setScore('accuracy',25,this)">중하 25</button>
                <button class="score-btn s-20" onclick="setScore('accuracy',20,this)">하 20</button>
              </div>
            </div>

            <!-- 창의성 -->
            <div class="score-section">
              <div class="score-label">
                <span class="criterion-name">② 표현의 창의성 및 심미성</span>
                <span class="tag">최대 40점</span>
              </div>
              <div class="score-buttons" id="score-creativity">
                <button class="score-btn s-40" onclick="setScore('creativity',40,this)">상 40</button>
                <button class="score-btn s-35" onclick="setScore('creativity',35,this)">중상 35</button>
                <button class="score-btn s-30" onclick="setScore('creativity',30,this)">중 30</button>
                <button class="score-btn s-25" onclick="setScore('creativity',25,this)">중하 25</button>
                <button class="score-btn s-20" onclick="setScore('creativity',20,this)">하 20</button>
              </div>
            </div>

            <!-- 완성도 -->
            <div class="score-section">
              <div class="score-label">
                <span class="criterion-name">③ 완성도</span>
                <span class="tag">최대 20점</span>
              </div>
              <div class="score-buttons" id="score-completion">
                <button class="score-btn s-20" onclick="setScore('completion',20,this)">상 20 (2개 제출)</button>
                <button class="score-btn s-15" onclick="setScore('completion',15,this)">중 15 (1개 제출)</button>
                <button class="score-btn s-10" onclick="setScore('completion',10,this)">하 10 (미제출)</button>
              </div>
            </div>

            <!-- 메모 -->
            <div class="memo-wrap">
              <label>교사 메모 (선택)</label>
              <textarea id="teacher-memo" placeholder="추가 의견이나 특이사항을 적어주세요..."></textarea>
            </div>

            <div style="display:flex;gap:.75rem;">
              <button class="btn btn-primary" style="flex:1;padding:.75rem;font-size:.92rem;" onclick="saveGrade()">
                💾 저장
              </button>
              <button class="btn" style="padding:.75rem 1rem;" onclick="nextStudent()">
                다음 ▶
              </button>
            </div>
            <div id="save-status" style="margin-top:.75rem;"></div>

          </div>
        </div>
      </div>
    </div>

    <!-- 전체 현황 -->
    <div class="panel" style="margin-top:1.5rem;">
      <div class="panel-header">
        📊 채점 현황
        <span class="tag tag-success" id="summary-count"></span>
      </div>
      <div class="panel-body" style="padding:.75rem 1rem;">
        <div style="overflow-x:auto;">
          <table class="summary-table">
            <thead>
              <tr>
                <th>번호</th><th>이름</th><th>원소</th>
                <th>내용 정확성</th><th>창의성</th><th>완성도</th>
                <th>총점</th><th>상태</th>
              </tr>
            </thead>
            <tbody id="summary-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import firebaseConfig from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── 전역 상태 ──
let allStudents  = [];   // [{studentId, name, cls, num, elements:[e1,e2]}]
let cardDataMap  = {};   // { elementNo: {frontUrl, backUrl} }
let grades       = {};   // { studentId: {accuracy, creativity, completion, memo, aiComment} }
let currentIdx   = 0;
let currentCls   = '';
let pdfDoc       = null;
let currentPdfPage = 1;
let totalPdfPages  = 1;

// 현재 학생 채점 상태
let tempScores = { accuracy: null, creativity: null, completion: null };

// ── 초기화 ──
async function init() {
  try {
    const snap = await getDoc(doc(db, 'converter', 'assignments'));
    if (!snap.exists()) return;
    const data = snap.data();
    const clsList = data.classList || [];
    const sel = document.getElementById('sel-cls');
    sel.innerHTML = '<option value="">반 선택</option>' +
      clsList.map(c => `<option value="${c}">${c}반</option>`).join('');
  } catch(e) { console.error(e); }
}

window.onClsChange = function() {
  const cls = document.getElementById('sel-cls').value;
  checkCanStart();
};

window.handlePdf = function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const fn = document.getElementById('pdf-filename');
  fn.textContent = file.name;
  fn.classList.remove('hidden');
  document.getElementById('pdf-zone').classList.add('has-file');
  loadPdfFile(file);
  checkCanStart();
};

// 드래그앤드롭
const pdfZone = document.getElementById('pdf-zone');
pdfZone.addEventListener('dragover', e => { e.preventDefault(); pdfZone.classList.add('dragover'); });
pdfZone.addEventListener('dragleave', () => pdfZone.classList.remove('dragover'));
pdfZone.addEventListener('drop', e => {
  e.preventDefault(); pdfZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') {
    document.getElementById('pdf-input').files; // 참조용
    const fn = document.getElementById('pdf-filename');
    fn.textContent = f.name; fn.classList.remove('hidden');
    pdfZone.classList.add('has-file');
    loadPdfFile(f);
    checkCanStart();
  }
});

async function loadPdfFile(file) {
  const ab = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: ab }).promise;
  totalPdfPages = pdfDoc.numPages;
  currentPdfPage = 1;
  renderPdfPage(1);
}

function checkCanStart() {
  const hasCls = !!document.getElementById('sel-cls').value;
  const hasPdf = !!pdfDoc;
  document.getElementById('btn-start').disabled = !(hasCls && hasPdf);
}

window.startGrading = async function() {
  currentCls = document.getElementById('sel-cls').value;
  if (!currentCls || !pdfDoc) return;

  // 학생 목록 로드
  const snap = await getDoc(doc(db, 'converter', 'assignments'));
  const data = snap.data();
  allStudents = Object.entries(data.assignments || {})
    .filter(([, s]) => s.clsKey === currentCls && s.elem1 !== null)
    .map(([sid, s]) => ({
      studentId: sid, name: s.name, cls: s.clsKey,
      num: s.num, elements: [s.elem1, s.elem2]
    }))
    .sort((a, b) => a.num - b.num);

  if (!allStudents.length) {
    alert('해당 반 학생 데이터가 없습니다.'); return;
  }

  // 카드 데이터 로드
  const cardSnap = await getDocs(collection(db, 'classes', currentCls, 'elements'));
  cardDataMap = {};
  cardSnap.forEach(d => { const v = d.data(); cardDataMap[v.elementNo] = v; });

  // 기존 채점 데이터 로드
  const gradeSnap = await getDocs(collection(db, 'grades', currentCls, 'students'));
  grades = {};
  gradeSnap.forEach(d => { grades[d.id] = d.data(); });

  document.getElementById('setup-card').classList.add('hidden');
  document.getElementById('grading-main').classList.remove('hidden');
  document.getElementById('nav-cls').textContent = currentCls + '반';
  document.getElementById('nav-total').textContent = allStudents.length;

  buildStudentSelect();
  buildProgressGrid();
  goToStudent(0);
  renderSummary();
};

// ── 학생 내비게이션 ──
function buildStudentSelect() {
  const sel = document.getElementById('student-sel');
  sel.innerHTML = allStudents.map((s, i) =>
    `<option value="${i}">${s.num}번 ${s.name}</option>`).join('');
}

function buildProgressGrid() {
  const grid = document.getElementById('progress-grid');
  grid.innerHTML = allStudents.map((s, i) => {
    const g = grades[s.studentId];
    const isDone = g && g.accuracy !== undefined;
    const total  = isDone ? 50 + g.accuracy + g.creativity + g.completion : null;
    return `<div class="prog-chip ${isDone ? 'done' : ''}" id="chip-${i}" onclick="goToStudent(${i})">
      <div class="chip-name">${s.num}. ${s.name}</div>
      <div class="chip-score">${isDone ? total + '점' : '미채점'}</div>
    </div>`;
  }).join('');
}

window.goToStudent = function(idx) {
  if (idx < 0 || idx >= allStudents.length) return;
  currentIdx = idx;
  const s = allStudents[idx];
  document.getElementById('student-sel').value = idx;
  document.getElementById('nav-idx').textContent  = idx + 1;
  document.getElementById('nav-current-name').textContent = s.name;
  document.getElementById('nav-elems').textContent = s.elements.join(', ');

  // 진행 칩 업데이트
  document.querySelectorAll('.prog-chip').forEach((c, i) => c.classList.toggle('current', i === idx));

  // 점수 초기화 후 기존 채점 로드
  tempScores = { accuracy: null, creativity: null, completion: null };
  resetScoreButtons();
  document.getElementById('teacher-memo').value = '';
  document.getElementById('ai-result-box').classList.add('hidden');
  document.getElementById('ai-status').innerHTML = '';
  document.getElementById('save-status').innerHTML = '';

  const existing = grades[s.studentId];
  if (existing) {
    if (existing.accuracy   !== undefined) setScore('accuracy',   existing.accuracy,   findScoreBtn('score-accuracy',   existing.accuracy));
    if (existing.creativity !== undefined) setScore('creativity', existing.creativity, findScoreBtn('score-creativity', existing.creativity));
    if (existing.completion !== undefined) setScore('completion', existing.completion, findScoreBtn('score-completion', existing.completion));
    if (existing.memo)      document.getElementById('teacher-memo').value = existing.memo;
    if (existing.aiComment) {
      document.getElementById('ai-comment').innerHTML = existing.aiComment;
      document.getElementById('ai-result-box').classList.remove('hidden');
    }
  }

  updateTotal();
  renderCards(s);

  // PDF 자동 페이지 이동 (번호 기반 추정)
  autoFindPage();
};

function findScoreBtn(groupId, score) {
  return document.querySelector(`#${groupId} .score-btn.s-${score}`);
}

window.prevStudent = function() { goToStudent(currentIdx - 1); };
window.nextStudent = function() { goToStudent(currentIdx + 1); };

// ── PDF 렌더링 ──
async function renderPdfPage(pageNum) {
  if (!pdfDoc) return;
  pageNum = Math.max(1, Math.min(pageNum, totalPdfPages));
  currentPdfPage = pageNum;
  const page    = await pdfDoc.getPage(pageNum);
  const canvas  = document.getElementById('pdf-canvas');
  const ctx     = canvas.getContext('2d');
  const vp      = page.getViewport({ scale: 1.8 });
  canvas.width  = vp.width;
  canvas.height = vp.height;
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  document.getElementById('pdf-page-num').textContent = `${pageNum} / ${totalPdfPages}`;
  document.getElementById('pdf-page-info').textContent = `${pageNum}p`;
  document.getElementById('pdf-prev').disabled = pageNum <= 1;
  document.getElementById('pdf-next').disabled = pageNum >= totalPdfPages;
}

window.changePdfPage = function(delta) { renderPdfPage(currentPdfPage + delta); };

// 학생 번호로 PDF 페이지 자동 추정 (학생당 2페이지 가정)
window.autoFindPage = function() {
  if (!pdfDoc || !allStudents.length) return;
  const s = allStudents[currentIdx];
  // 학번순 정렬 기준 인덱스 × 2 (앞면/뒷면 2페이지씩)
  const estimatedPage = Math.max(1, currentIdx + 1);
  if (estimatedPage <= totalPdfPages) renderPdfPage(estimatedPage);
};

// ── 카드 렌더링 ──
function renderCards(student) {
  const area = document.getElementById('card-area');
  const cards = student.elements.map(no => {
    const card = cardDataMap[no];
    if (!card || (!card.frontUrl && !card.backUrl)) {
      return `<div style="margin-bottom:1rem">
        <p style="font-size:.75rem;color:var(--text-muted);margin-bottom:.4rem">원소 ${no}번</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
          <div class="card-img-wrap no-card"><p>앞면 미업로드</p></div>
          <div class="card-img-wrap no-card"><p>뒷면 미업로드</p></div>
        </div>
      </div>`;
    }
    return `<div style="margin-bottom:1rem">
      <p style="font-size:.75rem;color:var(--text-muted);margin-bottom:.4rem">원소 ${no}번</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
        <div class="card-img-wrap">
          ${card.frontUrl
            ? `<img src="${card.frontUrl}" alt="원소${no} 앞면"><div class="img-label">앞면</div>`
            : '<div class="card-img-wrap no-card" style="position:absolute;inset:0"><p>앞면 없음</p></div>'}
        </div>
        <div class="card-img-wrap">
          ${card.backUrl
            ? `<img src="${card.backUrl}" alt="원소${no} 뒷면"><div class="img-label">뒷면</div>`
            : '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><p style="font-size:.75rem;color:var(--text-muted)">뒷면 없음</p></div>'}
        </div>

  }).join('');
  area.innerHTML = cards || '<p style="color:var(--text-muted);font-size:.85rem">카드가 없습니다.</p>';
}

// ── 채점 ──
window.setScore = function(criterion, value, btnEl) {
  tempScores[criterion] = value;
  const groupId = criterion === 'accuracy' ? 'score-accuracy'
                : criterion === 'creativity' ? 'score-creativity'
                : 'score-completion';
  document.querySelectorAll(`#${groupId} .score-btn`).forEach(b => b.classList.remove('selected'));
  if (btnEl) btnEl.classList.add('selected');
  updateTotal();
};

function resetScoreButtons() {
  ['score-accuracy','score-creativity','score-completion'].forEach(id => {
    document.querySelectorAll(`#${id} .score-btn`).forEach(b => b.classList.remove('selected'));
  });
  tempScores = { accuracy: null, creativity: null, completion: null };
  updateTotal();
}

function updateTotal() {
  const a = tempScores.accuracy   ?? 0;
  const c = tempScores.creativity ?? 0;
  const d = tempScores.completion ?? 0;
  const hasAny = tempScores.accuracy !== null || tempScores.creativity !== null || tempScores.completion !== null;
  document.getElementById('total-score-val').textContent = hasAny ? 50 + a + c + d : '—';
}

// ── AI 채점 ──
window.runAI = async function() {
  const s = allStudents[currentIdx];
  const statusEl = document.getElementById('ai-status');
  const btn      = document.getElementById('btn-ai');

  // 카드 이미지 수집

    if (card?.backUrl)  imageUrls.push({ url: card.backUrl,  label: `원소${no} 뒷면` });
  }

  // PDF 현재 페이지를 base64로 변환
  let pdfPageBase64 = null;
  if (pdfDoc) {
    try {
      const page   = await pdfDoc.getPage(currentPdfPage);
      const canvas = document.createElement('canvas');
      const vp     = page.getViewport({ scale: 2 });
      canvas.width = vp.width; canvas.height = vp.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      pdfPageBase64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
    } catch(e) { console.warn('PDF 페이지 변환 실패', e); }
  }

  btn.disabled = true;
  statusEl.innerHTML = '<div class="msg loading"><span class="spinner"></span>AI가 채점 중입니다... 잠시 기다려 주세요.</div>';

  try {
    // 이미지들을 base64로 변환
    const imageContents = [];
    if (pdfPageBase64) {
      imageContents.push({
        type: 'text',
        text: '[활동지 - 1차시 손글씨 작성본]'
      }, {
        type: 'image',
        source: { type: 'base64', media_type: 'image/jpeg', data: pdfPageBase64 }
      });
    }

    for (const img of imageUrls) {
      try {
        const b64 = await fetchImageAsBase64(img.url);
        imageContents.push(
          { type: 'text', text: `[${img.label}]` },
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } }
        );
      } catch(e) { console.warn('이미지 변환 실패:', img.label, e); }
    }

    const systemPrompt = `당신은 중학교 2학년 과학 수행평가 채점 보조 교사입니다.
학생이 제출한 원소 카드(캔바로 제작)와 1차시 손글씨 활동지를 보고 아래 채점 기준에 따라 1차 평가를 합니다.
반드시 JSON으로만 응답하세요. 다른 텍스트 없이 순수 JSON만 출력합니다.

채점 기준:
1. 내용의 정확성 및 충실성 (40점 만점)
   - 상(40): 원소 카드 2개의 기본정보(원소기호, 원자번호, 원자질량)가 모두 정확하고 심화내용(주요성질, 같은족 원소와의 유사성, 생활활용사례, 원소이름의 유래) 모두 충실히 기재
   - 중상(35): 기본정보 모두 정확, 심화내용 총 4~6개
   - 중(30): 기본정보 모두 정확, 심화내용 4개 미만 / 또는 기본정보 4~5개, 심화내용 6개 이상
   - 중하(25): 기본정보 3~4개, 심화내용 6가지 미만 / 또는 기본정보 2개 미만
   - 하(20): 원소 정보를 기록하지 않음

   - 중하(25): 모든 원소 카드에서 원소의 정보와 디자인의 연관성이 부족함
   - 하(20): 시각적 표현 요소 전무하거나 원소 카드를 제작하지 않음

3. 완성도 (20점 만점)
   - 상(20): 원소 카드 2개 제출
   - 중(15): 원소 카드 1개 제출
   - 하(10): 원소카드 미제출

JSON 형식:
{
  "accuracy": <20|25|30|35|40>,
  "creativity": <20|25|30|35|40>,

  "comment": "<구체적인 평가 이유, 잘된 점과 보완할 점을 2~3문장으로>"
}`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,

            { type: 'text', text: `위 자료를 바탕으로 채점 기준에 따라 평가해 주세요. 학생 이름: ${s.name}, 담당 원소: ${s.elements.join(', ')}번` }

    document.getElementById('ai-result-box').classList.remove('hidden');

async function fetchImageAsBase64(url) {
  const res  = await fetch(url);
  const blob = await res.blob();
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

// ── 저장 ──
window.saveGrade = async function() {
  const s = allStudents[currentIdx];
  if (tempScores.accuracy === null || tempScores.creativity === null || tempScores.completion === null) {
    document.getElementById('save-status').innerHTML = '<div class="msg error">3개 항목을 모두 선택해 주세요.</div>';
    return;
  }

  const total = 50 + tempScores.accuracy + tempScores.creativity + tempScores.completion;
  const aiComment = document.getElementById('ai-comment').innerHTML;
  const memo      = document.getElementById('teacher-memo').value.trim();

  const gradeData = {
    ...tempScores,
    total,
    memo,
    aiComment,
    gradedAt: new Date().toISOString(),
    studentName: s.name,
    cls: currentCls,
    num: s.num,
    elements: s.elements,
  };

  try {
    await setDoc(doc(db, 'grades', currentCls, 'students', s.studentId), gradeData);
    grades[s.studentId] = gradeData;
    document.getElementById('save-status').innerHTML = `<div class="msg success">✓ 저장 완료 · 총점 ${total}점</div>`;
    updateProgressChip(currentIdx, total);
    renderSummary();
    updateHeaderProgress();
    document.getElementById('btn-export').disabled = false;
  } catch(err) {
    document.getElementById('save-status').innerHTML = `<div class="msg error">저장 오류: ${err.message}</div>`;
  }
};

function updateProgressChip(idx, total) {
  const chip = document.getElementById(`chip-${idx}`);
  if (chip) {
    chip.classList.add('done');
    chip.querySelector('.chip-score').textContent = total + '점';
  }
}

function updateHeaderProgress() {
  const done  = Object.keys(grades).length;
  const total = allStudents.length;
  document.getElementById('header-progress').textContent = `${done} / ${total}명 채점 완료`;
}

// ── 요약 테이블 ──

window.exportExcel = function() {
  const rows = [['번호', '이름', '원소1', '원소2', '내용정확성', '창의성', '완성도', '총점', '교사메모', '채점일시']];
  allStudents.forEach(s => {
    const g = grades[s.studentId];
    rows.push([
      s.num, s.name,
      s.elements[0] || '', s.elements[1] || '',
      g?.accuracy ?? '', g?.creativity ?? '', g?.completion ?? '',
      g?.total ?? '',
      g?.memo ?? '',
      g?.gradedAt ? new Date(g.gradedAt).toLocaleString('ko-KR') : '',
    ]);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:6},{wch:10},{wch:6},{wch:6},{wch:12},{wch:10},{wch:8},{wch:8},{wch:30},{wch:20}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `${currentCls}반 채점결과`);
  XLSX.writeFile(wb, `원소카드_채점결과_${currentCls}반.xlsx`);
};

init();
</script>
